name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Commit built file to repository
        id: commit-dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/moca-react-graph.iife.js
          git diff --staged --quiet || git commit -m "chore: update build artifact [skip ci]"
          git push
          echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - uses: actions/deploy-pages@v4
        id: deployment
      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/kysayo/redmine-graph@master/dist/moca-react-graph.iife.js"
          curl -s "https://purge.jsdelivr.net/gh/kysayo/redmine-graph@${{ steps.commit-dist.outputs.hash }}/dist/moca-react-graph.iife.js"
      - name: Output new hash to Job Summary
        run: |
          HASH=${{ steps.commit-dist.outputs.hash }}
          echo "## View Customize URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "https://cdn.jsdelivr.net/gh/kysayo/redmine-graph@${HASH}/dist/moca-react-graph.iife.js" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "新しいハッシュ: \`${HASH}\`" >> "$GITHUB_STEP_SUMMARY"
